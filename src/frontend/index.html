<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DiSeCan - Buscador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

    <header>
        <div class="header-container">
            <img src="../assets/logo_disecan.png" alt="Logo DiSeCan" class="header-logo" />
            <h1 class="header-title">DiSeCan - Buscador Inteligente en el Diario de Sesiones del Parlamento de Canarias</h1>
            <img src="../assets/logo_iatext_vertical.png" alt="Logo IAText" class="header-logo logo-right" />
        </div>
    </header>

    <main id="main">
        
        <section class="search-section">
            <form id="search-form" onsubmit="performSearch(event)">
                
                <!-- Barra de búsqueda principal -->
                <div class="search-bar-container">
                    <input type="text" id="search-input" placeholder="Escriba los términos a buscar..." autocomplete="off" />
                    
                    <select id="search-mode" class="cat-dropdown" title="Modo de Búsqueda">
                        <option value="full">Híbrido + IA</option>
                        <option value="linguistics_only">Léxico Clásico</option>
                    </select>

                    <button type="submit" class="btn-buscar">Buscar</button>
                </div>
                
                <div class="search-options">
                    <a href="#" class="link-examples">Mostrar ejemplos de búsqueda</a>
                </div>

                <!-- Filtros (Dropdowns) -->
                <div class="filters-container">
                    <div class="filter-group">
                        <label>Presidente</label>
                        <select id="filter-president">
                            <option value="">Presidente/a</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Orador</label>
                        <select id="filter-speaker">
                            <option value="">Orador/a</option>
                            <option value="Ríos Pérez">Ríos Pérez</option>
                            <option value="Saavedra Acevedo">Saavedra Acevedo</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Legislatura</label>
                        <select id="filter-legislature">
                            <option value="">Legislatura</option>
                            <option value="III Legislatura">III Legislatura</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Sesión</label>
                        <select id="filter-session">
                            <option value="">Número sesión</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Fecha</label>
                        <select id="filter-date">
                            <option value="">Fecha sesión</option>
                        </select>
                    </div>
                </div>

            </form>
        </section>

        <!-- Contenedor de Resultados -->
        <section id="results-section" class="results-section" style="display: none;">
            
            <div id="loading-indicator" style="display: none;">
                <div class="spinner"></div>
                <p>Analizando documentos...</p>
            </div>

            <!-- Caja de la Respuesta del LLM -->
            <div id="ai-answer-container" class="ai-answer-container">
                <div class="ai-header">
                    <span class="ai-icon">🤖</span>
                    <h3>Síntesis Inteligente</h3>
                </div>
                <div id="ai-answer-content" class="ai-content"></div>
                <div id="ai-keywords" class="ai-keywords"></div>
            </div>

            <!-- Cabecera de resultados -->
            <div class="results-header" id="results-header">
                <span id="results-count">Se muestran resultados.</span>
            </div>

            <!-- Lista de Fragmentos (Fuentes) -->
            <div id="sources-list" class="sources-list">
                <!-- Los resultados se inyectan aquí -->
            </div>

        </section>

    </main>

    <script src="app.js"></script>
</body>

</html>
