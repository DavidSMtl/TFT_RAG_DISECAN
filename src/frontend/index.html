<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot DiSeCan </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <aside id="sidebar">
        <h2>Filtros Avanzados</h2>

        <div class="filter-group">
            <label>Modo de Búsqueda</label>
            <select id="search-mode">
                <option value="full">Completo (Híbrido + IA)</option>
                <option value="linguistics_only">Solo DiSeCan (Lingüístico)</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Legislatura</label>
            <select id="filter-legislature">
                <option value="">Todas las legislaturas</option>
                <option value="X Legislatura">X Legislatura</option>
                <option value="IX Legislatura">IX Legislatura</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Orador/a</label>
            <select id="filter-speaker">
                <option value="">Todos los intervinientes</option>
                <option value="Presidente/a">Presidente/a</option>
                <option value="Diputado/a A">Diputado/a A</option>
                <option value="Diputado/a B">Diputado/a B</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Sesión</label>
            <select id="filter-session">
                <option value="">Cualquier número</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Fecha de la Sesión</label>
            <input type="date" id="filter-date" />
        </div>

        <button class="btn-clear" onclick="clearFilters()">Restablecer Filtros</button>
        
        <div style="margin-top: auto; padding-top: 2rem; opacity: 0.6; font-size: 0.7rem; text-align: center;">
            Parlamento de Canarias<br>Proyecto DiSeCan
        </div>
    </aside>

    <!-- Overlay para móvil -->
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="main">
        <header>
            <button id="btn-menu" class="btn-menu" onclick="toggleSidebar()" aria-label="Abrir menú">☰</button>
            <div class="header-container">
                <img src="../assets/logo_disecan.png" alt="Logo DiSeCan" class="header-logo" />
                <h1 class="header-title">Asistente Inteligente · Diario de Sesiones</h1>
                <img src="../assets/logo_iatext_vertical.png" alt="Logo IAText" class="header-logo" />
            </div>
        </header>

        <div id="messages"></div>

        <form id="chat-form" onsubmit="sendMessage(event)">
            <input type="text" id="chat-input" placeholder="Escriba su pregunta sobre el Diario de Sesiones..." />
            <button type="submit">Enviar</button>
        </form>
    </div>

    <script src="/app.js"></script>
</body>

</html>
